[pytest]
# Sistem temp dizini (%LOCALAPPDATA%\Temp\pytest-of-<user>) ACL'i bozuldu ve
# admin/restart olmadan silinemiyor; varsayilan tmp_path o dizini kullanmaya
# calisip PermissionError veriyordu. pytest'i proje-yerel .pytest_tmp'e
# yonlendiriyoruz (her kosuda pytest tarafindan temizlenir).
addopts = --basetemp=.pytest_tmp
